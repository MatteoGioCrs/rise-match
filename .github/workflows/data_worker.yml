name: RISE.MATCH Data Worker
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install curl_cffi asyncpg

      - name: Scrape SwimCloud
        run: python backend/worker/scraper.py

      - name: Insert to database
        run: python backend/worker/inserter.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
